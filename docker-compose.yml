services:
  user-service:
    build: .
    ports:
      - "8002:8002"
    environment:
      - APP_ENV=development
      - DEBUG=true
      - DATABASE_URL=postgresql+asyncpg://user:password@postgres:5432/user_service_db
      - INTERNAL_API_SECRET=${INTERNAL_API_SECRET:-dev-internal-secret}
      - FIREBASE_CREDENTIALS_PATH=${FIREBASE_CREDENTIALS_PATH:-}
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: user_service_db
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d user_service_db"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
